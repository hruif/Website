<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=https://hruif.github.io/">
    <link rel="canonical" href="https://hruif.github.io/">
    <title>Redirecting to Rui Fan</title>
    <script>
      const target = new URL("https://hruif.github.io/");
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <p>
      Redirecting to <a href="https://hruif.github.io/">hruif.github.io</a>.
    </p>
  </body>
</html>
