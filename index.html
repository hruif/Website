<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=https://hruif.github.io/">
    <link rel="canonical" href="https://hruif.github.io/">
    <title>Redirecting to Rui Fan</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f8fa;
        color: #171c24;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 40px, 520px);
      }

      a {
        color: #176b87;
        font-weight: 750;
      }
    </style>
    <script>
      const target = new URL("https://hruif.github.io/");
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target);
    </script>
  </head>
  <body>
    <main>
      <p>
        Redirecting to <a href="https://hruif.github.io/">hruif.github.io</a>.
      </p>
    </main>
  </body>
</html>
